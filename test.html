<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Break Camp Registration</title>
<style>
    .modal-content {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    .modal-body {
        background: transparent !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    .aero_promotion_popup {
        background: transparent !important;
        padding: 0 !important;
        margin: 0 !important;
    }

    /* Style Roller's existing .modal-close button */
    .modal-close {
        position: absolute !important;
        top: 15px !important;
        right: 15px !important;
        z-index: 9999 !important;
        background: rgba(0, 0, 0, 0.7) !important;
        border: none !important;
        border-radius: 50% !important;
        width: 32px !important;
        height: 32px !important;
        cursor: pointer !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        transition: all 0.3s ease !important;
        box-shadow: none !important;
    }

    .modal-close:hover {
        background: rgba(232, 0, 13, 0.85) !important;
        transform: scale(1.1) !important;
    }

    .modal-close svg {
        width: 16px !important;
        height: 16px !important;
        color: #fff !important;
        transition: all 0.3s ease !important;
        filter: none !important;
    }

    .modal-close:hover svg {
        color: #fff !important;
    }

    /* Animations */
    @keyframes popIn {
        from { opacity: 0; transform: scale(0.85); }
        to   { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    /* Popup Container */
    .popup-container {
        position: relative;
        width: 100%;
        max-width: 650px;
        margin: 20px auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* Camp Image */
    .camp-image {
        width: 100%;
        height: auto;
        display: block;
        position: relative;
        z-index: 2;
    }

    /* Register Button */
    .register-button {
        background: linear-gradient(135deg, #e8000d, #ff4444);
        color: #fff;
        padding: 18px 45px;
        border: 3px solid #fff;
        border-radius: 50px;
        font-weight: 900;
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(232, 0, 13, 0.5);
        text-transform: uppercase;
        letter-spacing: 1px;
        text-decoration: none;
        display: inline-block;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        margin: 20px 0;
        animation: pulse 3s ease-in-out infinite;
        font-family: 'Arial Black', Arial, sans-serif;
    }

    .register-button:hover {
        transform: scale(1.08);
        box-shadow: 0 10px 35px rgba(232, 0, 13, 0.7);
    }

    .register-button:active {
        transform: scale(0.97);
    }

    .button-container {
        text-align: center;
        padding: 0 20px 20px;
        background: #000;
        position: relative;
        z-index: 2;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .popup-container {
            max-width: 95%;
            margin: 10px auto;
            border-radius: 15px;
        }

        .register-button {
            font-size: 1rem;
            padding: 15px 35px;
            width: 100%;
            max-width: 100%;
        }

        .button-container {
            padding: 0 15px 15px;
        }
    }

    @media (max-width: 480px) {
        .popup-container {
            max-width: 98%;
            margin: 5px auto;
            border-radius: 10px;
        }

        .register-button {
            font-size: 0.9rem;
            padding: 14px 30px;
        }

        .button-container {
            padding: 0 10px 10px;
        }
    }
</style>
</head>
<body>

<div class="popup-container">

    <!-- Camp Image -->
    <img src="https://storage.googleapis.com/aerosports/popups/MarchCamp/WhatsApp%20Image%202026-02-17%20at%2009.17.39.jpeg"
         alt="March Break Camp – Mon Mar 16th to Fri Mar 20th – Aerosports Scarborough"
         class="camp-image">

    <!-- Register Button -->
    <div class="button-container">
        <a href="https://ecom.roller.app/aerosportsscarborough/products/en/product/1651391?date=2026-03-16"
           target="_blank"
           rel="noopener"
           class="register-button">
            Register Now
        </a>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Hook into Roller's existing .modal-close button
    const existingCloseButton = document.querySelector('.modal-close');
    if (existingCloseButton) {
        existingCloseButton.addEventListener('click', function() {
            const modalContent = document.querySelector('.modal-content');
            if (modalContent) {
                modalContent.style.display = 'none';
            }
            const modalContainer = modalContent ? modalContent.closest('[class*="modal"]') : null;
            if (modalContainer && modalContainer !== modalContent) {
                modalContainer.style.display = 'none';
            }
        });
    }
});
</script>

</body>
</html>
